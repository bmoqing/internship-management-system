server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/internship_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # MyBatis-Plus ??
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # ??SQL???????
    map-underscore-to-camel-case: true # ????????

jwt:
  secret: "internship-jwt-secret-key-change-in-production-2026"
  expire-ms: 86400000
  refresh-expire-ms: 604800000

app:
  security:
    cors:
      allowed-origins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176,http://localhost:5177,http://127.0.0.1:5177,http://localhost:5178,http://127.0.0.1:5178,http://localhost:5179,http://127.0.0.1:5179,http://localhost:5180,http://127.0.0.1:5180,http://localhost:4173"
    login:
      max-attempts: 5
      lock-minutes: 15
  upload:
    base-dir: "./uploads"
    max-size-mb: 20
    sign-secret: "internship-file-sign-secret-change-in-production-2026"
    sign-expire-seconds: 300
